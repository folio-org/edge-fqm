server:
  port: 8081
spring:
  application:
    name: edge-fqm
  liquibase:
    enabled: false
folio:
  exchange:
    enabled: false # edge-common-spring provides its own HttpServiceProxyFactory (edgeHttpServiceProxyFactory)
  logging:
    exchange:
      enabled: true
      level: BASIC
  tenant:
    validation:
      enabled: false
management:
  endpoints:
    enabled-by-default: false
logging:
  level:
    org.springframework.web: debug
